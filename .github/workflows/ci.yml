name: Server CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x]
        steps:
            # 1. Checkout the repository
            - name: Checkout Repository
              uses: actions/checkout@v3

            # 2. Set up node.js
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                 node-version: ${{ matrix.node-version}}
            
            # 3. Install dependencies
            - name: Install Dependencies
              run: |
                cd server
                npm install
            
            # Create .env file with MongoDB URI and JWT secret
            - name: Create .env file
              run: |
                echo "MONGO_URI=mongodb://admin:password123@localhost:27017/mydb?authSource=admin" > server/.env
                echo "JWT_SECRET=supersecret" >> server/.env
            
            # 5. Run lint
            - name: Run Lint
              run: |
                cd server
                npmx eslint . || echo "No lint Configured"
            
            # 6. Run Tests
            - name: Run Tests
              run: |
                cd server
                npm test || echo "No tests Configured"

            # 7. Start server check
            - name: Start Server Check (Health check)
              run: |
                cd server
                node server.js &
                sleep 5
                curl -f http://localhost:3000 || exit 1